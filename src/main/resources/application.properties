server.port=8080
spring.application.name=V.E.C.T.O.R
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

vector.rate-limit.requests-per-minute=10
vector.rate-limit.tokens-per-request=100

vector.cache.answer-max-size=1000
vector.cache.wiki-max-size=500
vector.cache.expire-after-minutes=30

vector.model.simple-model=hf.co/Andycurrent/Gemma-3-1B-it-GLM-4.7-Flash-Heretic-Uncensored-Thinking_GGUF:Q3_K_S
vector.model.complex-model=hf.co/bartowski/gemma-2-2b-it-GGUF:Q3_K_S
vector.model.idle-timeout-minutes=5
vector.model.max-ram-percent=85

vector.ollama.base-url=http://localhost:11434
vector.ollama.timeout-seconds=60

vector.kiwix.zim-path=/home/jahazielo/Downloads/wikipedia_en_simple_all_nopic_2026-02.zim
vector.kiwix.max-results=5

vector.wikipedia.max-chars=1500
vector.wikipedia.enabled=true

logging.level.com.nexuslabs.vector=INFO
logging.level.org.springframework.web=INFO