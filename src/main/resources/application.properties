server.port=8080
spring.application.name=V.E.C.T.O.R
spring.main.lazy-initialization=true
spring.main.banner-mode=off
spring.thymeleaf.cache=true
spring.thymeleaf.enabled=false

vector.rate-limit.requests-per-minute=30
vector.rate-limit.tokens-per-request=500

vector.cache.answer-max-size=5000
vector.cache.wiki-max-size=2000
vector.cache.expire-after-minutes=60

vector.model.simple-model=phi3.5:mini
vector.model.complex-model=phi3.5:mini
vector.model.idle-timeout-minutes=30
vector.model.max-ram-percent=95

vector.ollama.base-url=http://localhost:11434
vector.ollama.timeout-seconds=60

vector.kiwix.zim-path=/home/jahazielo/Downloads/wikipedia_en_simple_all_nopic_2026-02.zim
vector.kiwix.port=8081
vector.kiwix.max-results=5

vector.wikipedia.max-chars=800
vector.wikipedia.enabled=false

logging.level.com.nexuslabs.vector=INFO
logging.level.org.springframework.web=INFO
