<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V.E.C.T.O.R - AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 1rem 2rem;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: #888;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            line-height: 1.6;
        }
        
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border-bottom-right-radius: 0.25rem;
        }
        
        .message.bot {
            align-self: flex-start;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-bottom-left-radius: 0.25rem;
        }
        
        .message .meta {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 0.5rem;
        }
        
        .input-container {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 1rem;
            padding: 0.5rem;
            display: flex;
            gap: 0.5rem;
        }
        
        .input-container input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e0e0e0;
            font-size: 1rem;
            padding: 0.75rem;
            outline: none;
        }
        
        .input-container button {
            background: linear-gradient(135deg, #2563eb 0%, #7b2cbf 100%);
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .input-container button:hover {
            transform: scale(1.02);
        }
        
        .input-container button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .loading {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #888;
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #2a2a4a;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: #3a1a2e;
            border: 1px solid #ff4444;
            color: #ff8888;
            padding: 1rem;
            border-radius: 0.5rem;
        }
        
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 250px;
            background: #0f0f1a;
            border-left: 1px solid #2a2a4a;
            padding: 1rem;
            transform: translateX(100%);
            transition: transform 0.3s;
        }
        
        .sidebar.open {
            transform: translateX(0);
        }
        
        .sidebar-toggle {
            position: fixed;
            right: 1rem;
            top: 1rem;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            color: #888;
            width: 2rem;
            height: 2rem;
            border-radius: 0.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">V.E.C.T.O.R</div>
        <div class="status">
            <div class="status-dot"></div>
            <span>Online</span>
        </div>
    </header>
    
    <main class="main">
        <div class="chat-container" id="chat">
            <div class="message bot">
                Hello! I'm V.E.C.T.O.R, your AI assistant. Ask me anything!
                <div class="meta">Nexus Labs</div>
            </div>
        </div>
        
        <div class="input-container">
            <input type="text" id="question" placeholder="Ask a question..." autocomplete="off">
            <button id="send">Send</button>
        </div>
    </main>
    
    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('question');
        const send = document.getElementById('send');
        
        async function ask() {
            const question = input.value.trim();
            if (!question) return;
            
            chat.innerHTML += `<div class="message user">${question}</div>`;
            input.value = '';
            
            chat.innerHTML += `<div class="loading"><div class="spinner"></div>Thinking...</div>`;
            chat.scrollTop = chat.scrollHeight;
            
            try {
                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({question})
                });
                
                const data = await res.json();
                
                chat.querySelector('.loading')?.remove();
                
                if (data.answer) {
                    chat.innerHTML += `<div class="message bot">${data.answer}<div class="meta">${data.model} • ${data.complexity} • ${data.processingTimeMs}ms</div></div>`;
                } else if (data.error) {
                    chat.innerHTML += `<div class="error">${data.error}</div>`;
                }
            } catch (e) {
                chat.querySelector('.loading')?.remove();
                chat.innerHTML += `<div class="error">Error: ${e.message}</div>`;
            }
            
            chat.scrollTop = chat.scrollHeight;
        }
        
        send.onclick = ask;
        input.onkeydown = e => { if (e.key === 'Enter') ask(); };
    </script>
</body>
</html>
